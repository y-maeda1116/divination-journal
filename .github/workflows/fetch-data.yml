name: Fetch PoE Data

on:
  workflow_dispatch:
    inputs:
      league:
        description: 'League Name (optional, empty = all leagues)'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Fetch character data
        env:
          POE_ACCOUNT: ${{ secrets.POE_ACCOUNT_NAME }}
          POE_LEAGUE: ${{ inputs.league }}
        run: |
          ARGS="--account=$POE_ACCOUNT --output-dir=./content"
          if [ -n "$POE_LEAGUE" ]; then
            ARGS="$ARGS --league=$POE_LEAGUE"
          fi
          go run ./scripts/fetch-poe-data $ARGS

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update PoE data"
          file_pattern: "content/**/*.json"
